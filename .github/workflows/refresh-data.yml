name: Refresh workforce data

on:
  push:
    paths:
      - 'data/raw/**'
      - 'scripts/parse_macro_data.py'
      - 'scripts/build_dashboard_data.py'
      - 'scripts/seed_workforce.py'
      - 'scripts/requirements.txt'
      - '.github/workflows/refresh-data.yml'
  workflow_dispatch:

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    # Prevent the auto-commit below from looping.
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Build dashboard data
        run: python scripts/build_dashboard_data.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: refresh workforce data [skip ci]"
            git push
          fi
